spring.application.name=place2prepare

spring.datasource.url=jdbc:postgresql://localhost:5433/place2prepare?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=yugabyte
spring.datasource.password=yugabyte
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

app.jwt.secret=VGhpc0lzQVNlY3VyZVNlY3JldEtleUZvclBsYWNlMlByZXBhcmVBcHAxMjM0NQ==
app.jwt.expiration-ms=900000
app.admin.setup-key=place2prepare-admin-2026
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.oauth2.frontend-login-url=${app.frontend.base-url}/login
app.enrollment.max-courses-per-student=${APP_MAX_COURSES_PER_STUDENT:10}

# Payments (self-serve Premium upgrade)
app.payments.enabled=${APP_PAYMENTS_ENABLED:true}
app.payments.provider=${APP_PAYMENTS_PROVIDER:mock}
app.payments.premium.price-inr=${APP_PAYMENTS_PREMIUM_PRICE_INR:999}
app.payments.premium.currency=${APP_PAYMENTS_PREMIUM_CURRENCY:INR}
# Stripe (activate by setting app.payments.provider=stripe)
app.payments.stripe.secret-key=${APP_PAYMENTS_STRIPE_SECRET_KEY:}
app.payments.stripe.webhook-secret=${APP_PAYMENTS_STRIPE_WEBHOOK_SECRET:}

# Notifications
app.notifications.log.enabled=${APP_NOTIFICATIONS_LOG_ENABLED:true}
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.from=${APP_NOTIFICATIONS_EMAIL_FROM:no-reply@place2prepare.local}
# To enable outgoing email, set spring.mail.host/port/username/password and
# APP_NOTIFICATIONS_EMAIL_ENABLED=true. Example (Gmail SMTP):
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${APP_MAIL_USERNAME}
# spring.mail.password=${APP_MAIL_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email
